name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  # --------------------------------------------------
  # Gitleaks: シークレット検出
  # --------------------------------------------------
  gitleaks:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------
  # Grype: 脆弱性スキャン（Trivy 代替）
  # Trivy は 2026年3月のサプライチェーン攻撃で全タグ汚染のため廃止。
  # --------------------------------------------------
  grype:
    name: Vulnerability Scan (Grype)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype (filesystem scan)
        run: grype dir:. --only-fixed --fail-on critical || true

  # --------------------------------------------------
  # Bandit: Python SAST
  # --------------------------------------------------
  bandit:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r backend/app/ \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            || true

  # --------------------------------------------------
  # Semgrep: 汎用 SAST
  # --------------------------------------------------
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep-results.sarif \
            --severity ERROR \
            || true

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        if: always()
        with:
          sarif_file: 'semgrep-results.sarif'

  # --------------------------------------------------
  # pip-audit: Python 依存脆弱性
  # --------------------------------------------------
  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pip-audit
          pip install -e backend/

      - name: Run pip-audit
        run: pip-audit --desc || true

  # --------------------------------------------------
  # npm audit: Node.js 依存脆弱性
  # --------------------------------------------------
  npm-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=critical || true

  # --------------------------------------------------
  # Dependency Review: PR時の依存変更チェック
  # --------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@e7aeea1772ec01da74cafda11c5caa463520ca59 # v3
        with:
          fail-on-severity: high
