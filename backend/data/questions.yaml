  - id: "decision_model"
    name: "Decision Model"
    order: 7
    questions:
      - id: "dm_001"
        text: "本番環境で重大バグが発覚。顧客影響は限定的だが拡大リスクあり。最初の判断は？"
        category_id: "decision_model"
        choices:
          - id: "a"
            label: "即座にホットフィックスを投入し、スピードで影響を最小化する"
          - id: "b"
            label: "根本原因を特定してから修正し、再発を確実に防ぐ"
          - id: "c"
            label: "顧客に先に連絡し、透明性を保ちながら修正を進める"
          - id: "d"
            label: "影響データを収集・分析し、修正の優先度を定量的に判断する"
        source_reference: "Klein_NDM_Recognition-Primed_Decision"

      - id: "dm_002"
        text: "3つの施策案があり、どれも一長一短。チーム内で意見が割れている。あなたの判断基準は？"
        category_id: "decision_model"
        choices:
          - id: "a"
            label: "長期的なビジョンとの整合性が最も高い案を選ぶ"
          - id: "b"
            label: "最もリスクが低く、失敗時のダメージが小さい案を選ぶ"
          - id: "c"
            label: "チームの合意形成を優先し、全員が納得できる案を探る"
          - id: "d"
            label: "データと実験結果に基づき、最も効果が実証された案を選ぶ"
        source_reference: "Kahneman_Thinking_Fast_Slow_System2"

      - id: "dm_003"
        text: "納期が迫る中、品質基準を満たさない成果物が上がってきた。どう対応する？"
        category_id: "decision_model"
        choices:
          - id: "a"
            label: "納期を守ることを優先し、最低限の品質で出荷する"
          - id: "b"
            label: "納期を延期してでも品質基準をクリアしてからリリースする"
          - id: "c"
            label: "スコープを縮小し、品質を保てる範囲で納期を守る"
          - id: "d"
            label: "ステークホルダーと交渉し、段階的リリースを提案する"
        source_reference: "Eisenhower_Matrix_Priority"

      - id: "dm_004"
        text: "メンバーが明らかに間違った技術選定を推進している。あなたの行動は？"
        category_id: "decision_model"
        choices:
          - id: "a"
            label: "データと事例を示し、論理的に代替案の優位性を説明する"
          - id: "b"
            label: "メンバーの自律性を尊重し、失敗から学ぶ機会として見守る"
          - id: "c"
            label: "権限を行使して方向転換を指示し、チーム全体のリスクを回避する"
          - id: "d"
            label: "小規模なPoCで両方を検証し、結果で判断する場を設ける"
        source_reference: "Vroom_Yetton_Decision_Model"

      - id: "dm_005"
        text: "重要な判断を迫られているが、情報が不十分。どこで判断を下す？"
        category_id: "decision_model"
        choices:
          - id: "a"
            label: "60%の情報が揃った時点で直感も交えて素早く決断する"
          - id: "b"
            label: "90%以上の情報を集めてから、確実性の高い判断を下す"
          - id: "c"
            label: "仮説を立てて小さく実行し、結果から方向修正する"
          - id: "d"
            label: "専門家やチームの知見を集約し、集合知で判断する"
        source_reference: "Boyd_OODA_Loop"

      - id: "dm_006"
        text: "予算が限られる中、どの領域に投資を集中させる？"
        category_id: "decision_model"
        choices:
          - id: "a"
            label: "既存顧客の満足度向上とリテンション施策"
          - id: "b"
            label: "新規市場の開拓と革新的な機能開発"
          - id: "c"
            label: "技術的負債の返済とインフラの安定化"
          - id: "d"
            label: "チームの採用・育成と組織力の強化"
        source_reference: "Porter_Competitive_Strategy"

      - id: "dm_007"
        text: "部下から「このタスクは自分の判断で進めてよいか」と聞かれた。承認基準は？"
        category_id: "decision_model"
        choices:
          - id: "a"
            label: "影響範囲が限定的で、失敗してもリカバリ可能なら自律判断OK"
          - id: "b"
            label: "金額やリソースが一定閾値以下なら承認不要"
          - id: "c"
            label: "顧客に直接影響しない範囲であれば自由に進めてよい"
          - id: "d"
            label: "チーム内で合意が取れていれば、上長承認なしで実行可"
        source_reference: "Delegation_Poker_Management3.0"

      - id: "dm_008"
        text: "プロジェクトの方向性について、経営層と現場で認識にズレがある。どう対処する？"
        category_id: "decision_model"
        choices:
          - id: "a"
            label: "現場のリアルなデータを経営層に提示し、認識を揃える"
          - id: "b"
            label: "経営層の意図を現場に翻訳し、納得感を醸成する"
          - id: "c"
            label: "双方を同席させるワークショップを設計し、対話の場を作る"
          - id: "d"
            label: "まず小さな成功事例を作り、実績で信頼を勝ち取る"
        source_reference: "Kotter_Change_Management"

      - id: "dm_009"
        text: "自分の判断が間違っていたと気づいた時、最も重視する行動は？"
        category_id: "decision_model"
        choices:
          - id: "a"
            label: "即座に方向転換し、損失を最小化する"
          - id: "b"
            label: "なぜ間違ったかを分析し、判断プロセスを改善する"
          - id: "c"
            label: "関係者に率直に説明し、信頼関係を維持する"
          - id: "d"
            label: "間違いから得られた学びを組織ナレッジとして共有する"
        source_reference: "Argyris_Double_Loop_Learning"

      - id: "dm_010"
        text: "新しいプロセスやルールを導入する際の判断軸は？"
        category_id: "decision_model"
        choices:
          - id: "a"
            label: "現場の負担増加が最小限で、段階的に浸透できること"
          - id: "b"
            label: "定量的に効果測定可能で、ROIが明確であること"
          - id: "c"
            label: "チーム全員の合意を得られ、自発的に運用されること"
          - id: "d"
            label: "業界のベストプラクティスに基づき、将来の拡張性があること"
        source_reference: "Lewin_Change_Model"

  - id: "tradeoff_scenarios"
    name: "Tradeoff Scenarios"
    order: 8
    questions:
      - id: "ts_001"
        text: "プロダクト開発で究極の選択を迫られた場合、あなたはどちらを優先する？"
        category_id: "tradeoff_scenarios"
        format: "binary_choice"
        choices:
          - id: "a"
            label: "素早くリリースして市場からフィードバックを得る（スピード重視）"
          - id: "b"
            label: "十分にテストし完成度を高めてからリリースする（品質重視）"
        source_reference: "Lean_Startup_vs_Craftsmanship"

      - id: "ts_002"
        text: "チームの技術選定方針として、あなたはどちらの立場を取る？"
        category_id: "tradeoff_scenarios"
        format: "binary_choice"
        choices:
          - id: "a"
            label: "新しい技術を積極的に採用し、競争優位を築く（革新重視）"
          - id: "b"
            label: "枯れた技術で堅実に構築し、安定運用を優先する（安定重視）"
        source_reference: "Gartner_Hype_Cycle_Technology_Adoption"

      - id: "ts_003"
        text: "成果の帰属について、あなたの価値観に近いのはどちら？"
        category_id: "tradeoff_scenarios"
        format: "binary_choice"
        choices:
          - id: "a"
            label: "個人の突出した貢献を正当に評価し報いるべき（個人重視）"
          - id: "b"
            label: "チーム全体の協力成果として平等に分かち合うべき（チーム重視）"
        source_reference: "Hofstede_Individualism_Collectivism"

      - id: "ts_004"
        text: "リソース配分で選ぶなら、あなたはどちらに重きを置く？"
        category_id: "tradeoff_scenarios"
        format: "binary_choice"
        choices:
          - id: "a"
            label: "今四半期の売上目標達成に直結する施策に集中する（短期重視）"
          - id: "b"
            label: "3年後の競争力につながる基盤投資を優先する（長期重視）"
        source_reference: "Christensen_Innovators_Dilemma"

      - id: "ts_005"
        text: "品質に対するあなたのスタンスは？"
        category_id: "tradeoff_scenarios"
        format: "binary_choice"
        choices:
          - id: "a"
            label: "完璧を目指して細部まで磨き込んでから世に出す（完璧重視）"
          - id: "b"
            label: "80%の出来でも前に進め、改善を繰り返す（進捗重視）"
        source_reference: "Voltaire_Perfect_Enemy_of_Good"

      - id: "ts_006"
        text: "意思決定のプロセスについて、あなたの好みは？"
        category_id: "tradeoff_scenarios"
        format: "binary_choice"
        choices:
          - id: "a"
            label: "自分の判断を信じて迅速に単独で決断する（自律重視）"
          - id: "b"
            label: "関係者と十分に議論し合意を得てから実行する（合意重視）"
        source_reference: "Vroom_Yetton_Autocratic_vs_Consultative"

      - id: "ts_007"
        text: "スキル開発の方向性として、あなたが選ぶのは？"
        category_id: "tradeoff_scenarios"
        format: "binary_choice"
        choices:
          - id: "a"
            label: "幅広い領域を浅く学び、全体を俯瞰できる力を養う（広さ重視）"
          - id: "b"
            label: "一つの領域を深く極め、専門家として突き抜ける（深さ重視）"
        source_reference: "T-shaped_Skills_Model"

      - id: "ts_008"
        text: "仕事の評価基準として、あなたが重視するのは？"
        category_id: "tradeoff_scenarios"
        format: "binary_choice"
        choices:
          - id: "a"
            label: "正しいプロセスを踏んでいるかどうかで評価すべき（プロセス重視）"
          - id: "b"
            label: "最終的な成果・アウトプットの質で評価すべき（成果重視）"
        source_reference: "Deming_Process_vs_Results"

  - id: "failure_patterns"
    name: "Failure Patterns"
    order: 9
    questions:
      - id: "fp_001"
        text: "仕事のパフォーマンスが明らかに落ちていると感じるのは、どんな状況？"
        category_id: "failure_patterns"
        choices:
          - id: "a"
            label: "睡眠不足や体調不良が3日以上続いている時"
          - id: "b"
            label: "やるべきことが多すぎてコンテキストスイッチが頻繁な時"
          - id: "c"
            label: "目標や方向性が不明確で、何のために働いているかわからない時"
          - id: "d"
            label: "人間関係のストレスや対立が解消されていない時"
        source_reference: "Maslach_Burnout_Inventory"

      - id: "fp_002"
        text: "大事なタスクがあるのに手がつかない。最もありがちな原因は？"
        category_id: "failure_patterns"
        choices:
          - id: "a"
            label: "完璧にやらなきゃという思いが強すぎて着手できない"
          - id: "b"
            label: "何から始めればいいかわからず、タスクが大きすぎると感じる"
          - id: "c"
            label: "もっと面白い作業に気を取られて、つい後回しにしてしまう"
          - id: "d"
            label: "失敗した時のことを考えてしまい、恐怖で動けなくなる"
        source_reference: "Steel_Procrastination_Equation"

      - id: "fp_003"
        text: "過去に判断を誤った時、振り返ってみると共通する原因は？"
        category_id: "failure_patterns"
        choices:
          - id: "a"
            label: "自分の経験を過信し、新しい情報を軽視していた"
          - id: "b"
            label: "楽観バイアスでリスクを過小評価していた"
          - id: "c"
            label: "周囲の意見に流されて、自分の直感を無視していた"
          - id: "d"
            label: "時間的プレッシャーに負けて、十分な検討を省略していた"
        source_reference: "Dunning_Kruger_Effect"

      - id: "fp_004"
        text: "同じ種類のミスを繰り返してしまうパターンとして心当たりがあるのは？"
        category_id: "failure_patterns"
        choices:
          - id: "a"
            label: "コミュニケーション不足で認識のズレが発生する"
          - id: "b"
            label: "確認・テスト工程を省略して不具合を見落とす"
          - id: "c"
            label: "スコープを広げすぎて期限に間に合わなくなる"
          - id: "d"
            label: "例外ケースやエッジケースへの考慮が甘い"
        source_reference: "Swiss_Cheese_Model_Reason"

      - id: "fp_005"
        text: "自信過剰になりやすいと感じる状況は？"
        category_id: "failure_patterns"
        choices:
          - id: "a"
            label: "過去に成功した同種のタスクに取り組む時"
          - id: "b"
            label: "自分の専門領域の話題で意見を求められた時"
          - id: "c"
            label: "時間に余裕があると感じている時"
          - id: "d"
            label: "周囲から高評価を受けた直後"
        source_reference: "Kahneman_Overconfidence_Bias"

      - id: "fp_006"
        text: "ストレスがピークに達した時、最初に現れる劣化サインは？"
        category_id: "failure_patterns"
        choices:
          - id: "a"
            label: "メールやメッセージの返信が極端に遅くなる"
          - id: "b"
            label: "細かいミスやタイプミスが急増する"
          - id: "c"
            label: "判断を先送りにして、決定を避けるようになる"
          - id: "d"
            label: "他者への態度が短気になり、コミュニケーションが雑になる"
        source_reference: "Yerkes_Dodson_Law"

      - id: "fp_007"
        text: "プロジェクト失敗から立ち直る際に、最も時間がかかる要因は？"
        category_id: "failure_patterns"
        choices:
          - id: "a"
            label: "自分の能力への自信が揺らぎ、次の挑戦に踏み出せない"
          - id: "b"
            label: "失敗原因の分析に時間をかけすぎて前に進めない"
          - id: "c"
            label: "チームや関係者との信頼修復に労力がかかる"
          - id: "d"
            label: "失敗の記憶が反芻され、精神的に消耗する"
        source_reference: "Seligman_Learned_Helplessness"

  - id: "context_adaptation"
    name: "Context Adaptation"
    order: 10
    questions:
      - id: "ca_001"
        text: "経営層への報告と、チームメンバーへの説明。あなたのスタイルの違いは？"
        category_id: "context_adaptation"
        choices:
          - id: "a"
            label: "経営層には結論とインパクトのみ、チームには背景と技術詳細を丁寧に"
          - id: "b"
            label: "経営層にはデータ中心で簡潔に、チームにはビジョンと動機を語る"
          - id: "c"
            label: "相手に関わらず同じ情報を伝え、解釈は相手に委ねる"
          - id: "d"
            label: "経営層には選択肢と推奨案を、チームには自律的に判断できる情報を"
        source_reference: "Situational_Leadership_Hersey_Blanchard"

      - id: "ca_002"
        text: "「至急対応して」と言われた時と、通常業務。あなたのモード切り替えは？"
        category_id: "context_adaptation"
        choices:
          - id: "a"
            label: "緊急時は端的に指示と行動のみ、通常時は丁寧に説明とフォロー"
          - id: "b"
            label: "緊急時も通常時も同じペースで慎重に対応する"
          - id: "c"
            label: "緊急時は即断即決で走り、通常時はじっくり合意形成する"
          - id: "d"
            label: "緊急度を自分で再評価し、本当に緊急なものだけモードを変える"
        source_reference: "Kahneman_System1_System2"

      - id: "ca_003"
        text: "集中して深く考える時と、軽い相談に乗る時のスタイルの違いは？"
        category_id: "context_adaptation"
        choices:
          - id: "a"
            label: "深い思考時は長文で網羅的に、軽い相談時は一言で端的に"
          - id: "b"
            label: "深い思考時は構造化して論理展開、軽い相談時は共感と質問中心"
          - id: "c"
            label: "深い思考時は独りで完結、軽い相談時は対話で一緒に考える"
          - id: "d"
            label: "どちらも同じ粒度で対応し、クオリティは変えない"
        source_reference: "Csikszentmihalyi_Flow_Theory"

      - id: "ca_004"
        text: "相手が専門家の場合と、初心者の場合。説明のどこを変える？"
        category_id: "context_adaptation"
        choices:
          - id: "a"
            label: "専門家には前提を省略し結論から、初心者には基礎から順序立てて"
          - id: "b"
            label: "専門家には技術用語を使い密度高く、初心者には比喩と例示を多用"
          - id: "c"
            label: "専門家には議論を求め、初心者には確認質問を挟みながら進める"
          - id: "d"
            label: "誰に対しても同じレベルで説明し、わからない部分は質問してもらう"
        source_reference: "Bloom_Taxonomy_Knowledge_Levels"

      - id: "ca_005"
        text: "プレッシャーが高い局面で、自分のコミュニケーションスタイルはどう変わる？"
        category_id: "context_adaptation"
        choices:
          - id: "a"
            label: "より指示的になり、明確な方向性を示すリーダーモードに切り替わる"
          - id: "b"
            label: "より慎重になり、確認と合意を重視する安全モードに入る"
          - id: "c"
            label: "よりオープンになり、チームの力を引き出すファシリテーターになる"
          - id: "d"
            label: "普段と変わらず、意識的に平常モードを維持しようとする"
        source_reference: "Goleman_Emotional_Intelligence_Leadership"

  - id: "reasoning_flow"
    name: "Reasoning Flow"
    order: 11
    questions:
      - id: "rf_001"
        text: "新しい問題に直面した時、あなたのデフォルトの思考ステップを並べてください"
        category_id: "reasoning_flow"
        format: "ordering"
        steps:
          - id: "step_gather"
            label: "情報収集：関連データと状況を把握する"
          - id: "step_define"
            label: "問題定義：何が本当の課題かを明確にする"
          - id: "step_generate"
            label: "解決案生成：複数のアプローチを考え出す"
          - id: "step_evaluate"
            label: "評価・比較：各案のメリット・デメリットを分析する"
          - id: "step_decide"
            label: "意思決定：最適な案を選択する"
          - id: "step_execute"
            label: "実行・検証：実行し、結果を確認する"
        source_reference: "Polya_How_to_Solve_It"

      - id: "rf_002"
        text: "コードレビューやドキュメントレビュー時の確認順序を並べてください"
        category_id: "reasoning_flow"
        format: "ordering"
        steps:
          - id: "step_overview"
            label: "全体像の把握：構造と目的を理解する"
          - id: "step_logic"
            label: "ロジック検証：処理の正しさを追う"
          - id: "step_edge"
            label: "エッジケース確認：例外や境界値を検討する"
          - id: "step_style"
            label: "スタイル・可読性：命名やフォーマットを確認する"
        source_reference: "Fagan_Code_Inspection"

      - id: "rf_003"
        text: "自分の判断や成果物を検証する際、最も信頼する方法は？"
        category_id: "reasoning_flow"
        choices:
          - id: "a"
            label: "他者にレビューを依頼し、別の視点からの指摘を受ける"
          - id: "b"
            label: "チェックリストやテスト項目を作り、機械的に確認する"
          - id: "c"
            label: "時間を置いてから見直し、フレッシュな目で再評価する"
          - id: "d"
            label: "実際に動かして結果を観察し、期待と一致するか確認する"
        source_reference: "Deming_PDCA_Cycle"

      - id: "rf_004"
        text: "新しい概念やスキルを習得する際、最も効果的だと感じる方法は？"
        category_id: "reasoning_flow"
        choices:
          - id: "a"
            label: "実際に手を動かしてプロジェクトを作りながら学ぶ"
          - id: "b"
            label: "体系的な書籍やコースで理論から順序立てて学ぶ"
          - id: "c"
            label: "他者に教えることで自分の理解を深める"
          - id: "d"
            label: "実例やケーススタディを分析し、パターンを抽出する"
        source_reference: "Kolb_Experiential_Learning_Cycle"

      - id: "rf_005"
        text: "自分の思考プロセスについて、最も当てはまる自己認識は？"
        category_id: "reasoning_flow"
        choices:
          - id: "a"
            label: "考えながら話す（アウトプットしながら整理するタイプ）"
          - id: "b"
            label: "十分に考えてから話す（内部で完結させてから共有するタイプ）"
          - id: "c"
            label: "書きながら考える（文章化することで思考が明確になるタイプ）"
          - id: "d"
            label: "議論しながら考える（対話の中で思考が発展するタイプ）"
        source_reference: "Metacognition_Flavell"

  - id: "communication_tone"
    name: "Communication Tone"
    order: 2
    questions:
      - id: "ton_001"
        text: "普段使う一人称は？"
        category_id: "communication_tone"
        question_type: "single_choice"
        choices:
          - id: "a"
            label: "私"
          - id: "b"
            label: "僕"
          - id: "c"
            label: "俺"
          - id: "d"
            label: "自分"
