        source_reference: ""

      - id: "ton_007"
        text: "会話の中で無意識に使いがちなフィラー（つなぎ言葉）は？"
        category_id: "communication_tone"
        question_type: "single_choice"
        choices:
          - id: "a"
            label: "まあ / なんか / とりあえず"
          - id: "b"
            label: "ぶっちゃけ / 正直 / 実際"
          - id: "c"
            label: "てか / いや / そもそも"
          - id: "d"
            label: "えっと / うーん / そうですね"
        source_reference: ""

